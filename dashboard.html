<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showcase NUC Dashboard — AD Group</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --border-light: #333;
    --online: #4ade80;
    --offline: #f87171;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #444;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --nsw: #c9a96e;
    --vic: #8b7355;
    --qld: #a0845c;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,12,12,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    border-bottom: 1px solid var(--border);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-svg {
    height: 28px;
    width: auto;
    fill: var(--text);
    display: block;
  }

  .logo-svg path {
    fill: var(--text);
  }

  .logo-divider {
    width: 1px;
    height: 16px;
    background: var(--border-light);
  }

  .logo-sub {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 400;
    color: var(--text2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--online);
    border-radius: 50%;
    animation: breathe 2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .last-updated {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border-light);
    border-radius: 2px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOOLBAR */
  .toolbar {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 52px;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 300px;
  }

  .search-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-light);
    padding: 6px 0 6px 20px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 13px;
  }

  .filters {
    display: flex;
    gap: 2px;
  }

  .filter-btn {
    padding: 5px 16px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text3);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .filter-btn:hover { color: var(--text2); border-color: var(--border); }
  .filter-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .stat-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .stat-dot.green { background: var(--online); }
  .stat-dot.red { background: var(--offline); }
  .stat span { color: var(--text2); }

  /* MAIN */
  .main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 32px;
  }

  /* SECTION */
  .section { margin-bottom: 48px; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 400;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .section-count {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  /* CARD */
  .card {
    background: var(--surface);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
  }

  .card:hover { background: var(--surface2); }

  .card-thumb {
    position: relative;
    aspect-ratio: 16 / 10;
    background: var(--bg);
    overflow: hidden;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-status {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.4);
  }

  .card-status.online { background: var(--online); }
  .card-status.offline { background: var(--offline); }

  .offline-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
  }

  .offline-icon {
    font-size: 24px;
    font-weight: 300;
    color: var(--offline);
    opacity: 0.6;
  }

  .offline-text {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card-info {
    padding: 14px 16px 16px;
  }

  .card-name {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card-time { color: var(--text2); }

  .card-state {
    padding: 2px 8px;
    border-radius: 2px;
    font-weight: 500;
    letter-spacing: 0.08em;
  }

  .state-nsw { color: var(--nsw); background: rgba(201,169,110,0.1); }
  .state-vic { color: var(--vic); background: rgba(139,115,85,0.1); }
  .state-qld { color: var(--qld); background: rgba(160,132,92,0.1); }
  .state-other { color: var(--text3); background: rgba(100,100,100,0.1); }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .lightbox.open { display: flex; }

  .lightbox-inner {
    max-width: 100%;
    max-height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .lightbox-img {
    max-width: 100%;
    max-height: calc(100vh - 160px);
    object-fit: contain;
    display: block;
  }

  .lightbox-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: transparent;
    border: none;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .lightbox-close:hover { color: var(--accent); }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--text2);
    font-size: 40px;
    cursor: pointer;
    padding: 20px;
    transition: color 0.2s;
    font-family: var(--serif);
  }

  .lightbox-nav:hover { color: var(--accent); }
  .lightbox-nav.prev { left: 40px; }
  .lightbox-nav.next { right: 40px; }

  .lightbox-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .lightbox-name {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text);
  }

  .lightbox-time {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* LOADING / EMPTY / ERROR */
  .loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--text2);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    gap: 16px;
  }

  .loading-ring {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text { color: var(--text3); }

  .error-state { color: var(--offline); }
</style>
</head>

<div class="main" id="mainContent">

    <div class="loading-ring"></div>
    <div class="loading-text">Loading display suites</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightboxBtn()">✕</button>
    <button class="lightbox-nav prev" onclick="navigateLightbox(-1)">‹</button>
    <button class="lightbox-nav next" onclick="navigateLightbox(1)">›</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-bar">
      <span class="lightbox-name" id="lightboxName"></span>
      <span class="lightbox-time" id="lightboxTime"></span>
    </div>
  </div>
</div>

<script>
const API_KEY   = 'AIzaSyBRVIbYrd43HdqoxNiw601_xC4jwTT_sEY';
const FOLDER_ID = '1KaH19gjY4Kln-NHhqkLPD_tMj85tTt2m';

let allFiles = [];
let filteredFiles = [];
let currentIndex = 0;
let activeState = 'all';
let searchQuery = '';

function getStateFromName(name) {
  const c = name.charAt(0);
  if (c === '2') return '2';
  if (c === '3') return '3';
  if (c === '4') return '4';
  return 'other';
}

function getStateLabel(s) {
  return { '2': 'NSW', '3': 'VIC', '4': 'QLD', 'other': 'Other' }[s] || 'Other';
}

function getStateClass(s) {
  return { '2': 'state-nsw', '3': 'state-vic', '4': 'state-qld' }[s] || 'state-other';
}

function getLastExpectedTime() {
  const now = new Date();
  const total = now.getHours() * 60 + now.getMinutes();
  if (total < 8 * 60 + 30 || total >= 17 * 60) return null;
  let rH = 8, rM = 30, last = null;
  while (rH < 17) {
    const c = new Date(now); c.setHours(rH, rM, 0, 0);
    if (c <= now) last = new Date(c);
    else break;
    rM += 30; if (rM >= 60) { rM -= 60; rH++; }
  }
  return last;
}

function isOffline(modifiedTime) {
  const last = getLastExpectedTime();
  if (!last) return false;
  return new Date(modifiedTime) < last;
}

function formatTime(modifiedTime) {
  const d = new Date(modifiedTime);
  const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 1) return 'just now';
  if (diff < 60) return `${diff}m ago`;
  const h = Math.floor(diff / 60);
  if (h < 24) return `${h}h ago`;
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function cleanName(filename) {
  return filename
    .replace(/ - \d{4}-\d{2}-\d{2} \d{2}-\d{2}\.jpg$/, '')
    .replace(/^\d+-/, '')
    .replace(/-/g, ' / ')
    .replace(/\s+/g, ' ')
    .trim();
}

function getThumbUrl(id) { return `https://drive.google.com/thumbnail?id=${id}&sz=w400&key=${API_KEY}`; }
function getFullUrl(id)  { return `https://drive.google.com/thumbnail?id=${id}&sz=w1600&key=${API_KEY}`; }

async function loadScreenshots() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='image/jpeg'+and+trashed=false&fields=files(id,name,modifiedTime)&orderBy=name&pageSize=1000&supportsAllDrives=true&includeItemsFromAllDrives=true&key=${API_KEY}`;
    const data = await fetch(url).then(r => r.json());
    if (data.error) { showError(data.error.message); return; }
    allFiles = (data.files || []).map(f => ({ ...f, state: getStateFromName(f.name), offline: isOffline(f.modifiedTime) }));
    updateStats();
    applyFilters();
    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { showError(e.message); }
  finally { btn.classList.remove('spinning'); }
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="error-state">Error: ${msg}</div>`;
}

function updateStats() {
  const on = allFiles.filter(f => !f.offline).length;
  const off = allFiles.filter(f => f.offline).length;
  document.getElementById('onlineCount').textContent = `${on} Online`;
  document.getElementById('offlineCount').textContent = `${off} Offline`;
}

function applyFilters() {
  filteredFiles = allFiles.filter(f => {
    const ms = activeState === 'all' || f.state === activeState;
    const mq = !searchQuery || f.name.toLowerCase().includes(searchQuery.toLowerCase());
    return ms && mq;
  });
  renderGrid();
}

function renderGrid() {
  const online  = filteredFiles.filter(f => !f.offline);
  const offline = filteredFiles.filter(f => f.offline);

  // Reorder filteredFiles so array indexes match render order (online first, then offline)
  filteredFiles = [...online, ...offline];

  const el = document.getElementById('mainContent');
  if (!filteredFiles.length) { el.innerHTML = '<div class="empty-state">No display suites found</div>'; return; }

  let html = '';

  if (online.length) {
    html += `<div class="section">
      <div class="section-header">
        <span class="section-title">Active</span>
        <span class="section-count">${online.length} display suite${online.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="grid">`;
    online.forEach((f, i) => html += renderCard(f, i));
    html += '</div></div>';
  }

  if (offline.length) {
    html += `<div class="section">
      <div class="section-header">
        <span class="section-title">No Recent Screenshot</span>
        <span class="section-count">${offline.length} display suite${offline.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="grid">`;
    offline.forEach((f, i) => html += renderCard(f, online.length + i));
    html += '</div></div>';
  }

  el.innerHTML = html;
}

function renderCard(f, idx) {
  const name  = cleanName(f.name);
  const state = getStateLabel(f.state);
  const sc    = getStateClass(f.state);
  const time  = formatTime(f.modifiedTime);

  if (f.offline) {
    return `<div class="card" onclick="openLightbox(${idx})">
      <div class="card-thumb">
        <div class="offline-placeholder">
          <div class="offline-icon">—</div>
          <div class="offline-text">No recent screenshot</div>
        </div>
        <div class="card-status offline"></div>
      </div>
      <div class="card-info">
        <div class="card-name" title="${f.name}">${name}</div>
        <div class="card-meta">
          <span class="card-time">${time}</span>
          <span class="card-state ${sc}">${state}</span>
        </div>
      </div>
    </div>`;
  }

  return `<div class="card" onclick="openLightbox(${idx})">
    <div class="card-thumb">
      <img src="${getThumbUrl(f.id)}" alt="${name}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-status online"></div>
    </div>
    <div class="card-info">
      <div class="card-name" title="${f.name}">${name}</div>
      <div class="card-meta">
        <span class="card-time">${time}</span>
        <span class="card-state ${sc}">${state}</span>
      </div>
    </div>
  </div>`;
}

function openLightbox(idx) {
  currentIndex = idx;
  showLightboxItem();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showLightboxItem() {
  const f = filteredFiles[currentIndex];
  if (!f) return;
  document.getElementById('lightboxImg').src = getFullUrl(f.id);
  document.getElementById('lightboxName').textContent = cleanName(f.name);
  document.getElementById('lightboxTime').textContent = formatTime(f.modifiedTime) + ' — ' + new Date(f.modifiedTime).toLocaleString('en-AU');
}

function navigateLightbox(dir) {
  currentIndex = (currentIndex + dir + filteredFiles.length) % filteredFiles.length;
  showLightboxItem();
}

function closeLightbox(e) { if (e.target === document.getElementById('lightbox')) closeLightboxBtn(); }
function closeLightboxBtn() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }

document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; applyFilters(); });
document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); activeState = b.dataset.state; applyFilters();
}));
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightboxBtn();
  if (e.key === 'ArrowLeft') navigateLightbox(-1);
  if (e.key === 'ArrowRight') navigateLightbox(1);
});

setInterval(loadScreenshots, 5 * 60 * 1000);
loadScreenshots();
</script>
</body>
</html>
